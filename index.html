<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AG AUTO TECH TADLEY</title>
  <meta name="description" content="AG Auto Tech Tadley - DPF direct injection clean, walnut blasting, automatic gearbox service, wheel alignment, tyres, remaps and coding.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#e9ecef;
      --white:#ffffff;
      --text:#151b24;
      --text-soft:#5d6674;
      --blue-dark:#0f1723;
      --blue-soft:#1a2434;
      --red:#d5332f;
      --yellow:#e5b400;
      --yellow-dark:#bc9300;

      --metal-1:#f8f9fb;
      --metal-2:#e1e6eb;
      --metal-3:#c7ced6;
      --metal-4:#9ca7b2;

      --steel:linear-gradient(135deg,#ffffff 0%, #eef2f5 18%, #dbe1e7 45%, #c0c8d1 68%, #eef2f5 100%);
      --steel-dark:linear-gradient(135deg,#202833 0%, #3c4652 18%, #9aa4ae 52%, #3b4550 82%, #151c27 100%);
      --panel:linear-gradient(180deg,#ffffff 0%, #f6f8fa 55%, #edf1f4 100%);
      --panel-dark:linear-gradient(180deg,#1a2230 0%, #111926 100%);

      --shadow:0 18px 45px rgba(0,0,0,.08);
      --shadow-card:0 18px 36px rgba(0,0,0,.08);
      --shadow-hover:0 28px 65px rgba(10,16,26,.18);

      --radius:26px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      background:
        radial-gradient(circle at top right, rgba(197,205,214,.45), transparent 28%),
        radial-gradient(circle at left top, rgba(229,180,0,.06), transparent 24%),
        linear-gradient(180deg,#f1f3f5 0%, #e9ecef 100%);
      color:var(--text);
      font-family:Inter,Arial,sans-serif;
      position:relative;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(to right, rgba(15,23,35,.025) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(15,23,35,.025) 1px, transparent 1px);
      background-size:42px 42px;
      pointer-events:none;
      z-index:0;
    }

    img{display:block;max-width:100%}
    a{text-decoration:none;color:inherit}
    button{font:inherit}

    .page{
      position:relative;
      z-index:1;
      max-width:1450px;
      margin:0 auto;
      padding:18px 18px 40px;
    }

    .sheet{
      width:100%;
      max-width:1280px;
      margin:0 auto;
      background:rgba(255,255,255,.93);
      border:1px solid #d9dfe5;
      border-radius:30px;
      box-shadow:0 25px 70px rgba(0,0,0,.10);
      overflow:hidden;
      backdrop-filter:blur(8px);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 22px;
      border-bottom:1px solid #e7eaee;
      background:linear-gradient(180deg,#ffffff 0%, #f3f6f8 100%);
      position:relative;
      flex-wrap:wrap;
    }

    .topbar::after{
      content:"";
      position:absolute;
      left:24px;
      right:24px;
      bottom:0;
      height:1px;
      background:linear-gradient(to right, transparent, #cfd6dd, transparent);
    }

    .brand{
      font-family:Oswald,Arial,sans-serif;
      font-size:clamp(1.45rem,2.2vw,2rem);
      line-height:1;
      text-transform:uppercase;
      letter-spacing:.05em;
      color:var(--blue-dark);
    }

    .top-meta{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .meta-pill{
      min-height:42px;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid #d8dee4;
      background:linear-gradient(180deg,#ffffff 0%, #f4f7f9 100%);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:800;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:#283140;
      box-shadow:0 8px 18px rgba(0,0,0,.04), inset 0 1px 0 rgba(255,255,255,.7);
    }

    .meta-pill strong{
      color:var(--red);
      margin-left:6px;
      font-size:13px;
      letter-spacing:0;
      text-transform:none;
    }

    .hero{
      position:relative;
      min-height:88vh;
      background:#111;
      overflow:hidden;
    }

    .hero img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      transform:scale(1.02);
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(90deg, rgba(7,10,15,.88) 0%, rgba(7,10,15,.64) 38%, rgba(7,10,15,.22) 72%, rgba(7,10,15,.10) 100%),
        linear-gradient(180deg, rgba(0,0,0,.12) 0%, rgba(0,0,0,.42) 100%);
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size:36px 36px;
      z-index:1;
      pointer-events:none;
    }

    .hero-inner{
      position:relative;
      z-index:2;
      min-height:88vh;
      display:grid;
      grid-template-columns:1.05fr .95fr;
      gap:26px;
      align-items:end;
      padding:34px;
    }

    .hero-copy{
      max-width:700px;
      padding-bottom:22px;
    }

    .hero-kicker{
      display:inline-flex;
      align-items:center;
      padding:9px 13px;
      border-radius:999px;
      background:rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.22);
      color:#fff;
      font-size:11px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      margin-bottom:16px;
      backdrop-filter:blur(8px);
    }

    .hero-title{
      margin:0 0 14px;
      font-family:Oswald,Arial,sans-serif;
      font-size:clamp(2.7rem,5vw,5.5rem);
      line-height:.96;
      text-transform:uppercase;
      letter-spacing:.03em;
      color:#fff;
      text-shadow:0 12px 28px rgba(0,0,0,.26);
    }

    .hero-title .accent{color:#f0c21b}

    .hero-subtitle{
      margin:0 0 24px;
      max-width:610px;
      font-size:clamp(1rem,1.45vw,1.12rem);
      line-height:1.75;
      color:#e9eef3;
      font-weight:600;
    }

    .hero-buttons{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .hero-panel{
      justify-self:end;
      width:min(470px,100%);
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(255,255,255,.12) 0%, rgba(255,255,255,.06) 100%);
      box-shadow:0 25px 60px rgba(0,0,0,.24);
      border-radius:30px;
      padding:22px;
      backdrop-filter:blur(14px);
      position:relative;
      overflow:hidden;
    }

    .hero-panel::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.18), transparent 40%, transparent 65%, rgba(255,255,255,.08));
      pointer-events:none;
    }

    .hero-panel::after{
      content:"";
      position:absolute;
      left:0;top:0;bottom:0;
      width:5px;
      background:linear-gradient(180deg,var(--yellow),var(--red));
    }

    .panel-badge,.section-badge{
      display:inline-flex;
      align-items:center;
      width:max-content;
      padding:7px 12px;
      border-radius:999px;
      background:linear-gradient(180deg,#fff8da,#f3e7af);
      border:1px solid #e7d581;
      color:#6f5903;
      font-size:11px;
      font-weight:800;
      letter-spacing:.16em;
      text-transform:uppercase;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
    }

    .hero-panel h2{
      margin:14px 0 10px;
      font-family:Oswald,Arial,sans-serif;
      text-transform:uppercase;
      font-size:clamp(1.9rem,2.7vw,2.75rem);
      line-height:1;
      color:#fff;
    }

    .hero-panel p{
      margin:0 0 18px;
      color:#e3e8ee;
      font-size:15px;
      line-height:1.7;
    }

    .metal-list{
      display:grid;
      gap:12px;
      margin-bottom:18px;
    }

    .metal-item{
      border:1px solid rgba(255,255,255,.15);
      background:linear-gradient(135deg, rgba(255,255,255,.18) 0%, rgba(255,255,255,.08) 100%);
      border-radius:18px;
      padding:14px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
    }

    .metal-item strong{
      display:block;
      margin-bottom:5px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:#fff;
    }

    .metal-item span{
      display:block;
      color:#e2e8ee;
      font-size:14px;
      line-height:1.55;
      font-weight:600;
    }

    .btn{
      min-height:56px;
      padding:13px 24px;
      border-radius:999px;
      font-weight:800;
      font-size:clamp(.98rem,1.4vw,1.06rem);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:none;
      cursor:pointer;
      transition:transform .25s ease, box-shadow .25s ease, filter .25s ease;
    }

    .btn:hover{transform:translateY(-2px);filter:brightness(1.02)}

    .btn-yellow{
      background:linear-gradient(180deg,var(--yellow),var(--yellow-dark));
      color:#171b21;
      box-shadow:0 12px 24px rgba(201,153,0,.28);
    }

    .btn-dark{
      background:linear-gradient(180deg,#2d3747,#111926);
      color:#fff;
      box-shadow:0 12px 24px rgba(0,0,0,.22);
    }

    .btn-steel{
      background:var(--steel);
      color:#18202b;
      border:1px solid #c7ced6;
      box-shadow:0 12px 22px rgba(0,0,0,.10), inset 0 1px 0 rgba(255,255,255,.75);
    }

    .section{padding:0 34px}
    .section-block{padding:34px 0 0}

    .divider{
      height:1px;
      background:linear-gradient(to right, transparent, #cfd5da, transparent);
      margin:30px 0;
    }

    .section-head{
      max-width:980px;
      margin:0 auto 18px;
      text-align:center;
    }

    .section-title{
      font-family:Oswald,Arial,sans-serif;
      text-transform:uppercase;
      font-size:clamp(2rem,2.7vw,2.9rem);
      line-height:1;
      color:var(--blue-dark);
      margin:12px 0 10px;
    }

    .section-sub{
      color:#56606d;
      font-size:clamp(.96rem,1.3vw,1.06rem);
      line-height:1.7;
      max-width:780px;
      margin:0 auto;
    }

    .special-grid{
      max-width:1140px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:22px;
    }

    .service-card,
    .feature-card,
    .gallery-card,
    .map-card,
    .booking-inner{
      transition:transform .28s ease, box-shadow .28s ease, border-color .28s ease;
    }

    .service-card{
      border:1px solid #d6dde4;
      background:linear-gradient(180deg,#ffffff 0%, #f4f7f9 50%, #edf1f4 100%);
      box-shadow:var(--shadow-card);
      overflow:hidden;
      border-radius:26px;
      cursor:pointer;
      position:relative;
    }

    .service-card:hover,
    .feature-card:hover,
    .gallery-card:hover,
    .map-card:hover,
    .booking-inner:hover{
      transform:translateY(-6px);
      box-shadow:var(--shadow-hover);
      border-color:#c2cad3;
    }

    .service-card-image{
      position:relative;
      height:300px;
      overflow:hidden;
      background:#ddd;
    }

    .service-card-image img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .45s ease;
    }

    .service-card:hover .service-card-image img{transform:scale(1.05)}

    .service-card-image::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.08) 0%, rgba(0,0,0,.34) 100%);
    }

    .service-card-badge{
      position:absolute;
      top:14px;
      left:14px;
      z-index:2;
      background:var(--steel);
      color:#111a27;
      padding:8px 11px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.13em;
      text-transform:uppercase;
      border-left:4px solid var(--yellow);
      border-radius:10px;
      box-shadow:0 6px 16px rgba(17,25,38,.12), inset 0 1px 0 rgba(255,255,255,.75);
    }

    .service-card-body{padding:22px}

    .service-name{
      font-size:clamp(1.35rem,1.8vw,1.8rem);
      font-weight:800;
      line-height:1.18;
      margin-bottom:8px;
      color:#18202b;
    }

    .service-desc{
      font-size:clamp(.98rem,1.15vw,1.04rem);
      line-height:1.65;
      color:#586271;
      margin-bottom:16px;
      font-style:italic;
    }

    .service-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .service-chip{
      display:inline-flex;
      align-items:center;
      font-size:11px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#5f4b02;
      background:linear-gradient(180deg,#fff9dd,#f0e1a0);
      border:1px solid #ead57c;
      padding:7px 11px;
      border-radius:999px;
    }

    .service-link{
      color:var(--red);
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .feature-grid{
      max-width:1140px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:18px;
    }

    .feature-card{
      border:1px solid #d7dde4;
      background:var(--steel);
      box-shadow:var(--shadow-card);
      border-radius:24px;
      padding:22px 18px;
      position:relative;
      overflow:hidden;
    }

    .feature-number{
      font-family:Oswald,Arial,sans-serif;
      font-size:2.1rem;
      line-height:1;
      color:#9aa4af;
      margin-bottom:14px;
      letter-spacing:.04em;
    }

    .feature-card h3{
      margin:0 0 10px;
      font-size:1.06rem;
      line-height:1.25;
      color:#171e28;
      text-transform:uppercase;
    }

    .feature-card p{
      margin:0;
      color:#53606e;
      font-size:14px;
      line-height:1.65;
      font-weight:600;
    }

    .booking-wrap{max-width:1140px;margin:0 auto}

    .booking-inner{
      border:1px solid #d6dde4;
      background:linear-gradient(180deg,#ffffff 0%, #f6f8fa 50%, #edf1f4 100%);
      padding:24px;
      border-radius:28px;
      box-shadow:var(--shadow-card);
    }

    .booking-layout{
      display:grid;
      grid-template-columns:.88fr 1.12fr;
      gap:22px;
      align-items:start;
    }

    .booking-side{
      border:1px solid #d7dde4;
      background:var(--panel-dark);
      border-radius:24px;
      padding:24px;
      color:#fff;
      position:relative;
      overflow:hidden;
    }

    .booking-side::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.10), transparent 44%, transparent 70%, rgba(255,255,255,.06));
      pointer-events:none;
    }

    .booking-side h3{
      margin:14px 0 10px;
      font-family:Oswald,Arial,sans-serif;
      text-transform:uppercase;
      font-size:2rem;
      line-height:1;
    }

    .booking-side p{
      margin:0 0 18px;
      color:#d7dde4;
      line-height:1.7;
      font-size:14px;
      font-weight:600;
    }

    .booking-side-list{display:grid;gap:12px}

    .booking-side-item{
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:14px;
      background:rgba(255,255,255,.05);
    }

    .booking-side-item strong{
      display:block;
      margin-bottom:4px;
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#fff;
    }

    .booking-side-item span{
      display:block;
      color:#dce3ea;
      font-size:14px;
      line-height:1.55;
      font-weight:600;
    }

    .form-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .field{display:flex;flex-direction:column;gap:8px}
    .field.full{grid-column:1 / -1}
    .hidden-field{display:none}

    label{
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#697382;
    }

    input,select,textarea{
      width:100%;
      padding:14px 15px;
      border:1px solid #d5dce3;
      background:linear-gradient(180deg,#ffffff 0%, #f8fafb 100%);
      color:var(--text);
      font:inherit;
      outline:none;
      border-radius:12px;
      transition:border-color .22s ease, box-shadow .22s ease, transform .18s ease;
    }

    input:focus,select:focus,textarea:focus{
      border-color:#b9c3cd;
      box-shadow:0 0 0 4px rgba(201,153,0,.10);
      transform:translateY(-1px);
    }

    textarea{min-height:120px;resize:vertical}
    .booking-actions{display:flex;justify-content:center;margin-top:18px}

    .powered{text-align:center;padding:8px 0 28px}
    .powered-title{font-size:clamp(1.1rem,1.6vw,1.35rem);font-weight:800;color:#2a3140;margin-bottom:8px}
    .powered-sub{font-size:clamp(.96rem,1.2vw,1.02rem);color:#444c58;margin-bottom:10px}
    .liqui-inline{display:flex;align-items:center;justify-content:center}
    .liqui-inline img{width:96px;height:auto;object-fit:contain;filter:drop-shadow(0 8px 16px rgba(0,0,0,.08))}

    .gallery-card{
      max-width:1140px;
      margin:0 auto;
      border:1px solid #d6dde4;
      background:linear-gradient(180deg,#ffffff 0%, #f4f6f8 50%, #edf1f4 100%);
      box-shadow:var(--shadow-card);
      border-radius:28px;
      overflow:hidden;
      cursor:pointer;
    }

    .gallery-card-top{
      position:relative;
      height:320px;
      overflow:hidden;
      background:#ddd;
    }

    .gallery-card-top img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform .45s ease;
    }

    .gallery-card:hover .gallery-card-top img{transform:scale(1.05)}

    .gallery-card-top::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.10) 0%, rgba(0,0,0,.60) 100%);
    }

    .gallery-card-label{
      position:absolute;
      left:26px;
      bottom:26px;
      z-index:2;
      background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.09));
      border:1px solid rgba(255,255,255,.25);
      color:#fff;
      padding:18px 20px;
      border-radius:18px;
      backdrop-filter:blur(8px);
      border-left:5px solid var(--yellow);
      max-width:calc(100% - 52px);
      box-shadow:0 10px 26px rgba(0,0,0,.18);
    }

    .gallery-card-label h3{
      margin:0 0 6px;
      font-family:Oswald,Arial,sans-serif;
      text-transform:uppercase;
      font-size:clamp(1.7rem,2.6vw,2.5rem);
      line-height:1;
    }

    .gallery-card-label p{
      margin:0;
      font-size:clamp(.95rem,1.2vw,1.05rem);
      line-height:1.5;
      color:#f3f5f8;
      font-weight:600;
    }

    .gallery-card-body{
      padding:22px 22px 24px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .gallery-card-text{
      color:#55606d;
      font-size:clamp(.96rem,1.25vw,1.05rem);
      line-height:1.7;
      max-width:760px;
    }

    .gallery-card-cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:12px 18px;
      border-radius:999px;
      background:var(--steel);
      color:#19212c;
      font-weight:800;
      font-size:13px;
      letter-spacing:.12em;
      text-transform:uppercase;
      white-space:nowrap;
      border:1px solid #c7ced6;
      box-shadow:0 10px 22px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.7);
    }

    .map-section{padding:0 34px 34px}

    .map-card{
      max-width:1140px;
      margin:0 auto;
      border:1px solid #d6dde4;
      background:linear-gradient(180deg,#ffffff 0%, #f4f6f8 55%, #edf1f4 100%);
      box-shadow:var(--shadow-card);
      border-radius:28px;
      overflow:hidden;
    }

    .map-head{
      padding:24px 22px 18px;
      text-align:center;
      border-bottom:1px solid #ececec;
      background:linear-gradient(180deg,#ffffff 0%, #f5f7f8 100%);
    }

    .map-head h3{
      margin:0 0 8px;
      font-family:Oswald,Arial,sans-serif;
      text-transform:uppercase;
      font-size:clamp(1.7rem,2.3vw,2.3rem);
