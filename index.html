<style>
*{box-sizing:border-box}
body{margin:0;font-family:Poppins,Arial,sans-serif;background:#0b0b0b;color:#fff}
.top-bar{background:#e10600;text-align:center;padding:6px;font-weight:600}
.hero img{width:100%;max-height:320px;object-fit:contain;display:block}
section{padding:60px 20px;max-width:1100px;margin:auto}
h1,h2{color:#e10600;text-align:center}
p{text-align:center}
.btn{display:inline-block;padding:12px 28px;background:#e10600;color:#fff;text-decoration:none;font-weight:700;border-radius:30px;margin:6px;transition:.3s;border:none;cursor:pointer}
.btn:hover{background:#b30500}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-top:25px}
.grid div{background:#151515;padding:18px;border-radius:12px;text-align:center}
footer{text-align:center;padding:20px;color:#999}

/* FORM */
form{background:#151515;padding:30px;border-radius:15px}
input,select,textarea{width:100%;padding:12px;margin-top:12px;border-radius:8px;border:none;font-size:15px}
label{margin-top:15px;display:block;font-weight:600}

/* SLIDER */
.slider{position:relative;overflow:hidden;border-radius:16px}
.slides{display:flex;transition:transform .6s ease-in-out}
.slides img{width:100%;flex-shrink:0;height:500px;object-fit:cover;cursor:pointer}
.prev,.next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.6);color:#fff;border:none;padding:12px 18px;cursor:pointer;font-size:20px;border-radius:50%}
.prev{left:15px}
.next{right:15px}
.dots{text-align:center;margin-top:15px}
.dot{display:inline-block;width:12px;height:12px;margin:5px;background:#555;border-radius:50%;cursor:pointer}
.active-dot{background:#e10600}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;z-index:9999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,.95);justify-content:center;align-items:center}
.lightbox img{max-width:90%;max-height:90%;border-radius:10px}
.lightbox span{position:absolute;top:30px;right:40px;font-size:40px;color:white;cursor:pointer}

@media(max-width:768px){.slides img{height:300px}}
</style>

<body>

<div class="top-bar">Open Mon–Sat • Tadley • Call 07920 778 706</div>

<header class="hero">

<section>

<!-- GALLERY -->
<section>
<h2>Garage Gallery</h2>
<div class="slider">
<div class="slides" id="slides"></div>
<button class="prev" onclick="moveSlide(-1)">❮</button>
<button class="next" onclick="moveSlide(1)">❯</button>
</div>
<div class="dots" id="dots"></div>
</section>

<!-- BOOKING -->
<section id="booking">
<h2>Book Appointment Online</h2>

<form onsubmit="return false;">
<label>1. Full Name</label>
<input id="fullname" placeholder="Your Full Name" required>

<label>2. Vehicle Registration</label>
<input id="reg" placeholder="e.g. AB12CDE" required>

<label>3. Select Service</label>
<select id="service" onchange="toggleTyres()">
<option value="Car Service">Car Service</option>
<option value="MOT Preparation">MOT Preparation</option>
<option value="Diagnostics">Diagnostics</option>
<option value="Brakes / Repairs">Brakes / Repairs</option>
<option value="Tyres">Tyres</option>
</select>

<div id="tyreOptions" style="display:none;">
<label>Tyre Size</label>
<input id="tyreSize" placeholder="e.g. 225/40R18">

<label>Number of Tyres</label>
<select id="tyreQty">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<label>Tyre Quality</label>
<select id="tyreType">
<option>Premium</option>
<option>Mid-Range</option>
<option>Budget</option>
</select>
</div>

<label>Preferred Date</label>
<input type="date" id="date">

<label>Preferred Time</label>
<input type="time" id="time">

<label>Additional Notes</label>
<textarea id="message"></textarea>

<button class="btn" onclick="sendBooking()">📅 Submit Booking</button>
</form>
</section>

<footer>© 2026 AG Auto-Tech Tadley</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
<span>&times;</span>
<img id="lightbox-img">
</div>

<script>
/* GENERATE 13 IMAGES */
const slides=document.getElementById("slides");
for(let i=1;i<=13;i++){
 let img=document.createElement("img");
 img.src="garage"+i+".jpg";
 img.alt="AG Auto-Tech Tadley garage photo "+i;
 img.loading="lazy";
 img.onclick=function(){openLightbox(this.src);}
 slides.appendChild(img);
}

let index=0;
const totalSlides=slides.children.length;
const dotsContainer=document.getElementById("dots");

for(let i=0;i<totalSlides;i++){
 let dot=document.createElement("span");
 dot.classList.add("dot");
 dot.onclick=()=>goToSlide(i);
 dotsContainer.appendChild(dot);
}

function updateSlider(){
 slides.style.transform="translateX("+(-index*100)+"%)";
 document.querySelectorAll(".dot").forEach(d=>d.classList.remove("active-dot"));
 document.querySelectorAll(".dot")[index].classList.add("active-dot");
}
function moveSlide(step){
 index+=step;
 if(index>=totalSlides)index=0;
 if(index<0)index=totalSlides-1;
 updateSlider();
}
function goToSlide(i){index=i;updateSlider();}
setInterval(()=>{moveSlide(1)},4000);
updateSlider();

/* LIGHTBOX */
function openLightbox(src){
 document.getElementById("lightbox").style.display="flex";
 document.getElementById("lightbox-img").src=src;
}
function closeLightbox(){
 document.getElementById("lightbox").style.display="none";
}

/* TYRE OPTIONS */
function toggleTyres(){
 let service=document.getElementById("service").value;
 document.getElementById("tyreOptions").style.display=(service==="Tyres")?"block":"none";
}

/* SEND TO WHATSAPP */
function sendBooking(){
 let name=document.getElementById("fullname").value;
 let reg=document.getElementById("reg").value;
 let service=document.getElementById("service").value;
 let tyreSize=document.getElementById("tyreSize").value;
 let tyreQty=document.getElementById("tyreQty").value;
 let tyreType=document.getElementById("tyreType").value;
 let date=document.getElementById("date").value;
 let time=document.getElementById("time").value;
 let msg=document.getElementById("message").value;

 if(name===""||reg===""){
   alert("Please complete required fields");
   return;
 }

 let text="BOOKING REQUEST%0A"+
 "Name: "+name+"%0A"+
 "Reg: "+reg+"%0A"+
 "Service: "+service+"%0A";

 if(service==="Tyres"){
   text+="Tyre Size: "+tyreSize+"%0A"+
   "Quantity: "+tyreQty+"%0A"+
   "Type: "+tyreType+"%0A";
 }

 text+="Date: "+date+"%0A"+
 "Time: "+time+"%0A"+
 "Notes: "+msg;

 window.open("https://wa.me/447920778706?text="+text,"_blank");
}
</script>
