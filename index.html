<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AG Auto-Tech Tadley | Car Service, MOT & Tyres Tadley</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Poppins,Arial,sans-serif;
  background:#0b0b0b;
  color:#fff;
}

.top-bar{
  background:#e10600;
  text-align:center;
  padding:6px;
  font-weight:600;
}

.hero img{
  width:100%;
  max-height:280px;
  object-fit:contain;
  display:block;
}

section{
  padding:50px 20px;
  max-width:1100px;
  margin:auto;
}

h1,h2{
  color:#e10600;
  text-align:center;
}

.btn{
  display:inline-block;
  padding:12px 28px;
  background:#e10600;
  color:#fff;
  text-decoration:none;
  font-weight:700;
  border-radius:30px;
  margin:6px;
  border:none;
  cursor:pointer;
}

/* ===== SMALL SQUARE GALLERY ===== */

.gallery-container{
  position:relative;
  margin-top:30px;
}

.gallery-track{
  display:flex;
  gap:15px;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding:10px 0;
}

.gallery-track::-webkit-scrollbar{
  height:6px;
}
.gallery-track::-webkit-scrollbar-thumb{
  background:#e10600;
  border-radius:10px;
}

.gallery-item{
  flex:0 0 120px;
  height:120px;
  background:#111;
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:transform 0.3s ease;
}

.gallery-item:hover{
  transform:scale(1.08);
}

.gallery-item img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.gallery-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#e10600;
  border:none;
  color:#fff;
  padding:8px 12px;
  cursor:pointer;
  border-radius:50%;
}

.gallery-prev{left:-10px}
.gallery-next{right:-10px}

/* ===== LIGHTBOX WITH NAVIGATION ===== */

.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}

.lightbox-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#e10600;
  border:none;
  color:#fff;
  font-size:22px;
  padding:10px 14px;
  cursor:pointer;
  border-radius:50%;
}

.lb-prev{left:30px}
.lb-next{right:30px}

.lb-close{
  position:absolute;
  top:25px;
  right:35px;
  font-size:35px;
  cursor:pointer;
  color:white;
}

footer{
  text-align:center;
  padding:20px;
  color:#999;
}
</style>
</head>

<body>

<div class="top-bar">Open Mon–Sat • Tadley • Call 07920 778 706</div>

<div class="hero">
<img src="banner.jpg" alt="AG Auto-Tech Tadley Garage">
</div>

<section>
<h1>Car Service & Repairs in Tadley</h1>
<div style="text-align:center;">
<a href="tel:07920778706" class="btn">Call Now</a>
<a href="https://wa.me/447920778706" class="btn">WhatsApp</a>
</div>
</section>

<section>
<h2>Garage Gallery</h2>

<div class="gallery-container">
<button class="gallery-btn gallery-prev" onclick="scrollGallery(-1)">❮</button>
<div class="gallery-track" id="galleryTrack"></div>
<button class="gallery-btn gallery-next" onclick="scrollGallery(1)">❯</button>
</div>

</section>

<footer>© AG Auto-Tech Tadley</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<span class="lb-close" onclick="closeLightbox()">×</span>
<button class="lightbox-btn lb-prev" onclick="changeImage(-1)">❮</button>
<img id="lightboxImg">
<button class="lightbox-btn lb-next" onclick="changeImage(1)">❯</button>
</div>

<script>

const track=document.getElementById("galleryTrack");
let images=[];
let currentIndex=0;

/* GENERATE 19 IMAGES */
for(let i=1;i<=19;i++){
  let div=document.createElement("div");
  div.className="gallery-item";

  let img=document.createElement("img");
  img.src="garage"+i+".jpg";

  images.push(img.src);

  img.onclick=function(){openLightbox(i-1);};

  div.appendChild(img);
  track.appendChild(div);
}

/* SCROLL GALLERY */
function scrollGallery(direction){
  track.scrollBy({
    left: direction * 300,
    behavior:'smooth'
  });
}

/* LIGHTBOX FUNCTIONS */

function openLightbox(index){
  currentIndex=index;
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightboxImg").src=images[currentIndex];
}

function closeLightbox(){
  document.getElementById("lightbox").style.display="none";
}

function changeImage(direction){
  currentIndex+=direction;

  if(currentIndex<0) currentIndex=images.length-1;
  if(currentIndex>=images.length) currentIndex=0;

  document.getElementById("lightboxImg").src=images[currentIndex];
}

/* KEYBOARD CONTROL */
document.addEventListener("keydown",function(e){
  if(document.getElementById("lightbox").style.display==="flex"){
    if(e.key==="ArrowRight") changeImage(1);
    if(e.key==="ArrowLeft") changeImage(-1);
    if(e.key==="Escape") closeLightbox();
  }
});

/* CLOSE ON BACKGROUND CLICK */
document.getElementById("lightbox").addEventListener("click",function(e){
  if(e.target.id==="lightbox"){
    closeLightbox();
  }
});

</script>

</body>
</html>
